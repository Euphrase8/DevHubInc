name: Daily Contribution

on:
  schedule:
    # Run every day at 14:00 EAT (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  contribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Make daily contribution
        run: |
          mkdir -p .github
          TODAY=$(date -u +%Y-%m-%d)
          
          # Generate small random activity
          COMMITS=$((RANDOM % 3 + 1))
          
          for i in $(seq 1 $COMMITS); do
            {
              echo ""
              echo "## $TODAY - Auto-update"
              echo ""
              echo "Routine maintenance and dependency status update."
              echo ""
            } >> .github/daily-dev.md
            
            git config user.name "Euphrase8"
            git config user.email "joachim.euphrase@gmail.com"
            git add .github/daily-dev.md
            git commit -m "chore: daily maintenance update [$TODAY]"
          done
      
      - name: Push changes
        run: git push
